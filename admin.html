<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — Emin Fırın</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream:  #FAFAF6;
        --cream2: #F4EEE2;
        --brown:  #3D2010;
        --brown2: #6B3A1F;
        --amber:  #C49A3C;
        --muted:  rgba(30,16,9,0.44);
        --border: rgba(61,32,16,0.09);
        --red: #c0392b;
        --green: #27a25c;
        --sans: "Helvetica Neue", Arial, sans-serif;
        --serif: Georgia, serif;
        --r: 8px;
      }

      html {
        scroll-behavior: smooth;
      }
      body {
        background: #F4EEE2;
        color: var(--brown);
        font-family: var(--sans);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ─── LOGIN SCREEN ─────────────────────────────── */
      #loginScreen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--brown);
      }

      .login-box {
        background: var(--cream);
        border-radius: 16px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .login-box__logo {
        height: 64px;
        margin-bottom: 20px;
      }

      .login-box h1 {
        font-family: var(--serif);
        font-size: 1.4rem;
        font-weight: 400;
        margin-bottom: 32px;
        color: var(--brown);
      }

      /* ─── SHARED FORM ELEMENTS ─────────────────────── */
      label {
        display: block;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 6px;
        text-align: left;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"],
      input[type="number"],
      textarea,
      select {
        width: 100%;
        padding: 11px 14px;
        border: 1px solid var(--border);
        border-radius: var(--r);
        background: #fff;
        color: var(--brown);
        font-size: 0.9rem;
        font-family: var(--sans);
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 16px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--brown2);
      }

      textarea {
        resize: vertical;
        min-height: 72px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 22px;
        border-radius: var(--r);
        border: none;
        cursor: pointer;
        font-size: 0.84rem;
        font-family: var(--sans);
        font-weight: 600;
        letter-spacing: 0.04em;
        transition:
          opacity 0.2s,
          background 0.2s;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .btn--primary {
        background: var(--brown);
        color: var(--cream);
      }
      .btn--primary:hover:not(:disabled) {
        background: var(--brown2);
      }
      .btn--secondary {
        background: var(--cream2);
        color: var(--brown);
        border: 1px solid var(--border);
      }
      .btn--secondary:hover:not(:disabled) {
        background: #f0dda0;
      }
      .btn--danger {
        background: var(--red);
        color: #fff;
      }
      .btn--danger:hover:not(:disabled) {
        opacity: 0.85;
      }
      .btn--sm {
        padding: 7px 14px;
        font-size: 0.78rem;
      }
      .btn--full {
        width: 100%;
      }

      .form-error {
        background: #fde8e8;
        color: var(--red);
        border-radius: var(--r);
        padding: 10px 14px;
        font-size: 0.82rem;
        margin-bottom: 16px;
        display: none;
      }

      /* ─── APP LAYOUT ────────────────────────────────── */
      #appScreen {
        display: none;
      }

      .app-top {
        background: var(--brown);
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 60px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .app-top__brand {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--cream);
        font-size: 0.82rem;
        letter-spacing: 0.08em;
      }

      .app-top__brand img {
        height: 36px;
      }

      .app-main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px 80px;
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 28px;
        align-items: start;
      }

      /* ─── SIDEBAR ────────────────────────────────────── */
      .sidebar {
        background: var(--cream);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        position: sticky;
        top: 76px;
      }

      .sidebar__head {
        background: var(--cream2);
        padding: 16px 18px;
        font-size: 0.72rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .cat-list {
        list-style: none;
      }

      .cat-list__item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 18px;
        border-bottom: 1px solid var(--border);
        font-size: 0.88rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      .cat-list__item:hover {
        background: var(--cream2);
      }
      .cat-list__item.active {
        background: var(--cream2);
        font-weight: 600;
      }

      .cat-list__item__count {
        font-size: 0.72rem;
        background: rgba(61,32,16,0.08);
        padding: 2px 8px;
        border-radius: 99px;
        color: var(--muted);
      }

      .sidebar__add {
        padding: 14px 18px;
        border-top: 1px solid var(--border);
      }

      /* ─── MAIN PANEL ────────────────────────────────── */
      .panel {
        background: var(--cream);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }

      .panel__head {
        background: var(--cream2);
        padding: 18px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .panel__head h2 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--brown);
      }

      .panel__body {
        padding: 24px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* ─── ITEM TABLE ─────────────────────────────────── */
      .item-table {
        width: 100%;
        border-collapse: collapse;
      }

      .item-table th {
        text-align: left;
        font-size: 0.68rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 12px 12px;
        border-bottom: 1px solid var(--border);
      }

      .item-table td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 0.86rem;
        vertical-align: middle;
      }

      .item-table tr:last-child td {
        border-bottom: none;
      }

      .item-table tr:hover td {
        background: rgba(74, 35, 0, 0.03);
      }

      .item-thumb {
        width: 48px;
        height: 48px;
        object-fit: cover;
        border-radius: 6px;
        background: var(--cream2);
        display: block;
      }

      .item-thumb-placeholder {
        width: 48px;
        height: 48px;
        background: var(--cream2);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
      }

      .badge {
        display: inline-block;
        padding: 3px 9px;
        border-radius: 99px;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      .badge--on {
        background: #d4f0e3;
        color: #1a7a45;
      }
      .badge--off {
        background: #ede4d4;
        color: #6B3A1F;
      }

      .actions {
        display: flex;
        gap: 6px;
      }

      /* ─── MODAL ──────────────────────────────────────── */
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 500;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        background: var(--cream);
        border-radius: 14px;
        width: 100%;
        max-width: 500px;
        max-height: 92vh;
        overflow-y: auto;
        padding: 32px 28px;
      }

      .modal__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .modal__title {
        font-family: var(--serif);
        font-size: 1.2rem;
        font-weight: 400;
      }

      .modal__close {
        background: none;
        border: none;
        font-size: 1.4rem;
        cursor: pointer;
        color: var(--muted);
        line-height: 1;
        padding: 4px;
      }

      .modal__close:hover {
        color: var(--brown);
      }

      /* image preview */
      .img-preview {
        width: 100%;
        height: 140px;
        border: 2px dashed var(--border);
        border-radius: var(--r);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        overflow: hidden;
        background: var(--cream2);
        cursor: pointer;
        transition: border-color 0.2s;
        position: relative;
      }

      .img-preview:hover {
        border-color: var(--brown2);
      }

      .img-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: calc(var(--r) - 2px);
      }

      .img-preview__label {
        font-size: 0.78rem;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }

      #fileInput {
        display: none;
      }

      .upload-progress {
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin-bottom: 12px;
        overflow: hidden;
        display: none;
      }

      .upload-progress__bar {
        height: 100%;
        background: var(--brown);
        width: 0%;
        transition: width 0.3s;
      }

      /* cat modal */
      #catModal .modal {
        max-width: 360px;
      }

      /* ─── TOAST ──────────────────────────────────────── */
      .toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: var(--brown);
        color: var(--cream);
        padding: 12px 20px;
        border-radius: var(--r);
        font-size: 0.84rem;
        z-index: 9999;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.25s,
          transform 0.25s;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.success {
        background: var(--green);
      }
      .toast.error {
        background: var(--red);
      }

      /* ─── RESPONSIVE ─────────────────────────────────── */
      @media (max-width: 768px) {
        /* Giriş kutusu */
        .login-box {
          padding: 32px 20px;
        }

        /* Üst bar */
        .app-top {
          padding: 0 14px;
          height: 52px;
        }
        .app-top__brand img {
          height: 28px;
        }
        .app-top__brand span {
          font-size: 0.75rem;
        }

        /* Ana grid → tek sütun */
        .app-main {
          grid-template-columns: 1fr;
          padding: 16px 12px 60px;
          gap: 16px;
        }
        .sidebar {
          position: static;
        }

        /* Panel */
        .panel__head {
          padding: 14px 16px;
          flex-wrap: wrap;
        }
        .panel__body {
          padding: 14px;
        }

        /* iOS: input font-size 16px altında sayfa zoom yapıyor */
        input,
        textarea,
        select {
          font-size: 16px;
        }

        /* Kategori listesi — büyük dokunma hedefi */
        .cat-list__item {
          min-height: 52px;
          padding: 12px 14px;
        }
        .cat-list__item .btn--sm {
          min-width: 34px;
          min-height: 34px;
        }

        /* Tablo → kart görünümü */
        .item-table thead {
          display: none;
        }
        .item-table,
        .item-table tbody {
          display: block;
        }
        .item-table tr {
          display: grid;
          grid-template-columns: 56px 1fr auto;
          grid-template-rows: auto auto;
          gap: 4px 10px;
          padding: 14px 0;
          border-bottom: 1px solid var(--border);
          align-items: center;
        }
        .item-table tr:last-child {
          border-bottom: none;
        }
        .item-table tr:hover td {
          background: none;
        }
        .item-table td {
          padding: 0;
          border: none;
        }
        /* Küçük resim — iki satır boyunca */
        .item-table td:nth-child(1) {
          grid-column: 1;
          grid-row: 1 / 3;
          align-self: center;
        }
        /* Ürün adı */
        .item-table td:nth-child(2) {
          grid-column: 2;
          grid-row: 1;
        }
        /* Fiyat */
        .item-table td:nth-child(3) {
          grid-column: 3;
          grid-row: 1;
          white-space: nowrap;
          font-size: 0.88rem;
          font-weight: 600;
        }
        /* Durum */
        .item-table td:nth-child(4) {
          grid-column: 2;
          grid-row: 2;
        }
        /* Aksiyonlar */
        .item-table td:nth-child(5) {
          grid-column: 3;
          grid-row: 2;
          justify-self: end;
        }
        .actions {
          flex-direction: column;
          gap: 4px;
          align-items: stretch;
        }
        .actions .btn {
          font-size: 0.72rem;
          padding: 6px 10px;
          text-align: center;
        }

        /* Modal — alt çekmece */
        .modal-backdrop {
          padding: 0;
          align-items: flex-end;
        }
        .modal {
          border-radius: 18px 18px 0 0;
          padding: 24px 18px 32px;
          max-height: 90vh;
          max-width: 100%;
        }
        #catModal .modal {
          border-radius: 18px 18px 0 0;
          max-width: 100%;
        }

        /* Toast — tam genişlik */
        .toast {
          left: 12px;
          right: 12px;
          bottom: 16px;
          text-align: center;
        }
      }

      @media (max-width: 380px) {
        .login-box {
          padding: 24px 14px;
        }
        .app-main {
          padding: 12px 8px 60px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ─── GİRİŞ EKRANI ─────────────────────────────── -->
    <div id="loginScreen">
      <div class="login-box">
        <img
          src="assets/images/Logo.png"
          alt="Emin Fırın"
          class="login-box__logo"
        />
        <h1>Admin Paneli</h1>
        <div class="form-error" id="loginError"></div>
        <label for="loginPass">Şifre</label>
        <input type="password" id="loginPass" autocomplete="current-password" />
        <button class="btn btn--primary btn--full" id="loginBtn">
          Giriş Yap
        </button>
      </div>
    </div>

    <!-- ─── ANA EKRAN ──────────────────────────────────── -->
    <div id="appScreen">
      <div class="app-top">
        <div class="app-top__brand">
          <img src="assets/images/Logo.png" alt="" />
          <span>Menü Yönetimi</span>
        </div>
        <button class="btn btn--secondary btn--sm" id="logoutBtn">Çıkış</button>
      </div>

      <div class="app-main">
        <!-- Sidebar: Kategoriler -->
        <aside class="sidebar">
          <div class="sidebar__head">
            <span>Kategoriler</span>
          </div>
          <ul class="cat-list" id="catList"></ul>
          <div class="sidebar__add">
            <button
              class="btn btn--secondary btn--full btn--sm"
              id="openCatModal"
            >
              + Yeni Kategori
            </button>
          </div>
        </aside>

        <!-- Panel: Ürünler -->
        <section class="panel">
          <div class="panel__head">
            <h2 id="panelTitle">Kategori seçin</h2>
            <button
              class="btn btn--primary btn--sm"
              id="openItemModal"
              disabled
            >
              + Ürün Ekle
            </button>
          </div>
          <div class="panel__body" id="panelBody">
            <p style="color: var(--muted); font-size: 0.88rem">
              Sol taraftan bir kategori seçin.
            </p>
          </div>
        </section>
      </div>
    </div>

    <!-- ─── ÜRÜN MODAL ────────────────────────────────── -->
    <div class="modal-backdrop" id="itemModal">
      <div class="modal">
        <div class="modal__head">
          <span class="modal__title" id="itemModalTitle">Ürün Ekle</span>
          <button class="modal__close" onclick="closeModal('itemModal')">
            ×
          </button>
        </div>
        <div class="form-error" id="itemError"></div>

        <div
          class="img-preview"
          id="imgPreview"
          onclick="document.getElementById('fileInput').click()"
        >
          <div class="img-preview__label">
            Fotoğraf seç<br /><small>Tıkla veya sürükle</small>
          </div>
        </div>
        <div class="upload-progress" id="uploadProgress">
          <div class="upload-progress__bar" id="progressBar"></div>
        </div>
        <input type="file" id="fileInput" accept="image/*" />

        <input type="hidden" id="itemId" />
        <label for="itemName">Ürün Adı</label>
        <input type="text" id="itemName" placeholder="Peynirli Poğaça" />

        <label for="itemDesc">Açıklama (isteğe bağlı)</label>
        <textarea id="itemDesc" placeholder="Kısa açıklama…"></textarea>

        <label for="itemPrice">Fiyat (₺)</label>
        <input
          type="number"
          id="itemPrice"
          min="0"
          step="0.5"
          placeholder="0.00"
        />

        <label for="itemAvailable">Stok Durumu</label>
        <select id="itemAvailable">
          <option value="true">Mevcut</option>
          <option value="false">Tükendi</option>
        </select>

        <div style="display: flex; gap: 10px; margin-top: 8px">
          <button class="btn btn--primary" id="saveItemBtn" style="flex: 1">
            Kaydet
          </button>
          <button class="btn btn--secondary" onclick="closeModal('itemModal')">
            İptal
          </button>
        </div>
      </div>
    </div>

    <!-- ─── KATEGORİ MODAL ──────────────────────────── -->
    <div class="modal-backdrop" id="catModal">
      <div class="modal" style="max-width: 360px">
        <div class="modal__head">
          <span class="modal__title" id="catModalTitle">Kategori Ekle</span>
          <button class="modal__close" onclick="closeModal('catModal')">
            ×
          </button>
        </div>
        <div class="form-error" id="catError"></div>
        <input type="hidden" id="catId" />
        <label for="catName">Kategori Adı</label>
        <input type="text" id="catName" placeholder="Ekmekler" />
        <label for="catOrder">Sıra</label>
        <input type="number" id="catOrder" min="0" value="0" />
        <div style="display: flex; gap: 10px; margin-top: 8px">
          <button class="btn btn--primary" id="saveCatBtn" style="flex: 1">
            Kaydet
          </button>
          <button class="btn btn--secondary" onclick="closeModal('catModal')">
            İptal
          </button>
        </div>
      </div>
    </div>

    <!-- ─── TOAST ──────────────────────────────────── -->
    <div class="toast" id="toast"></div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      // ─── Supabase bağlantısı ──────────────────────────
      const SUPABASE_URL = "https://psrkdpmnxdxsutpdyjtb.supabase.co";
      const SUPABASE_ANON = "sb_publishable_IHApcPm72s-UIqW9oLfjyQ_jDNj5k49";
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      // ─── Durum ───────────────────────────────────────
      let currentCatId = null;
      let currentCatName = "";
      let uploadedImgUrl = null;
      let cats = [];
      let itemCounts = {};

      // ─── Auth ─────────────────────────────────────────
      document
        .getElementById("loginBtn")
        .addEventListener("click", async () => {
          const btn = document.getElementById("loginBtn");
          const err = document.getElementById("loginError");
          const pass = document.getElementById("loginPass").value;
          err.style.display = "none";
          btn.disabled = true;
          btn.textContent = "Giriş yapılıyor…";

          const { error } = await sb.auth.signInWithPassword({
            email: "admin@eminfirincafe.com",
            password: pass,
          });

          if (error) {
            err.textContent = "Hatalı e-posta veya şifre.";
            err.style.display = "block";
            btn.disabled = false;
            btn.textContent = "Giriş Yap";
          } else {
            showApp();
          }
        });

      document.getElementById("loginPass").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
      });

      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          await sb.auth.signOut();
          document.getElementById("loginScreen").style.display = "flex";
          document.getElementById("appScreen").style.display = "none";
        });

      sb.auth.onAuthStateChange((event, session) => {
        if (session) {
          showApp();
        }
      });

      function showApp() {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("appScreen").style.display = "block";
        loadCategories();
      }

      // ─── Kategoriler ──────────────────────────────────
      async function loadCategories() {
        const { data, error } = await sb
          .from("categories")
          .select("*")
          .order("sort_order", { ascending: true });

        if (error) {
          toast("Kategoriler yüklenemedi", "error");
          return;
        }

        cats = data || [];

        // Ürün sayıları için tek sorgu
        const { data: counts } = await sb
          .from("menu_items")
          .select("category_id");
        itemCounts = {};
        (counts || []).forEach((r) => {
          itemCounts[r.category_id] = (itemCounts[r.category_id] || 0) + 1;
        });

        renderCatList();
      }

      function renderCatList() {
        const ul = document.getElementById("catList");
        ul.innerHTML = cats
          .map(
            (c) => `
          <li class="cat-list__item ${c.id === currentCatId ? "active" : ""}"
              onclick="selectCat('${c.id}', '${escJs(c.name)}')">
            <span>${escHtml(c.name)}</span>
            <div style="display:flex;align-items:center;gap:6px;">
              <span class="cat-list__item__count">${itemCounts[c.id] || 0}</span>
              <button class="btn btn--secondary btn--sm"
                      onclick="event.stopPropagation(); editCat('${c.id}', '${escJs(c.name)}', ${c.sort_order})"
                      style="padding:3px 8px; font-size:0.68rem">✏</button>
              <button class="btn btn--danger btn--sm"
                      onclick="event.stopPropagation(); deleteCat('${c.id}')"
                      style="padding:3px 8px; font-size:0.68rem">✕</button>
            </div>
          </li>
        `,
          )
          .join("");
      }

      function selectCat(id, name) {
        currentCatId = id;
        currentCatName = name;
        document.getElementById("panelTitle").textContent = name;
        document.getElementById("openItemModal").disabled = false;
        document
          .querySelectorAll(".cat-list__item")
          .forEach((li) => li.classList.remove("active"));
        event.currentTarget.classList.add("active");
        loadItems();
        if (window.innerWidth <= 768) {
          setTimeout(
            () =>
              document
                .querySelector(".panel")
                .scrollIntoView({ behavior: "smooth", block: "start" }),
            80,
          );
        }
      }

      // Kategori CRUD
      document.getElementById("openCatModal").addEventListener("click", () => {
        document.getElementById("catId").value = "";
        document.getElementById("catName").value = "";
        document.getElementById("catOrder").value = cats.length;
        document.getElementById("catModalTitle").textContent = "Yeni Kategori";
        document.getElementById("catError").style.display = "none";
        openModal("catModal");
      });

      function editCat(id, name, order) {
        document.getElementById("catId").value = id;
        document.getElementById("catName").value = name;
        document.getElementById("catOrder").value = order;
        document.getElementById("catModalTitle").textContent =
          "Kategori Düzenle";
        document.getElementById("catError").style.display = "none";
        openModal("catModal");
      }

      document
        .getElementById("saveCatBtn")
        .addEventListener("click", async () => {
          const id = document.getElementById("catId").value;
          const name = document.getElementById("catName").value.trim();
          const order =
            parseInt(document.getElementById("catOrder").value) || 0;
          const errEl = document.getElementById("catError");

          if (!name) {
            errEl.textContent = "Kategori adı gerekli.";
            errEl.style.display = "block";
            return;
          }

          const slug = name
            .toLocaleLowerCase("tr-TR")
            .replace(/ğ/g, "g")
            .replace(/ü/g, "u")
            .replace(/ş/g, "s")
            .replace(/ı/g, "i")
            .replace(/ö/g, "o")
            .replace(/ç/g, "c")
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-|-$/g, "");

          const payload = { name, slug, sort_order: order };
          let error;

          if (id) {
            ({ error } = await sb
              .from("categories")
              .update(payload)
              .eq("id", id));
          } else {
            ({ error } = await sb.from("categories").insert(payload));
          }

          if (error) {
            errEl.textContent = error.message;
            errEl.style.display = "block";
            return;
          }
          closeModal("catModal");
          toast("Kategori kaydedildi", "success");
          loadCategories();
        });

      async function deleteCat(id) {
        if (!confirm("Bu kategori ve tüm ürünleri silinecek. Emin misiniz?"))
          return;
        const { error } = await sb.from("categories").delete().eq("id", id);
        if (error) {
          toast("Silinemedi: " + error.message, "error");
          return;
        }
        if (currentCatId === id) {
          currentCatId = null;
          document.getElementById("panelTitle").textContent = "Kategori seçin";
          document.getElementById("panelBody").innerHTML =
            '<p style="color:var(--muted); font-size:0.88rem;">Sol taraftan bir kategori seçin.</p>';
          document.getElementById("openItemModal").disabled = true;
        }
        toast("Kategori silindi", "success");
        loadCategories();
      }

      // ─── Ürünler ─────────────────────────────────────
      async function loadItems() {
        const body = document.getElementById("panelBody");
        body.innerHTML =
          '<p style="color:var(--muted); padding:12px 0; font-size:0.86rem;">Yükleniyor…</p>';

        const { data, error } = await sb
          .from("menu_items")
          .select("*")
          .eq("category_id", currentCatId)
          .order("sort_order", { ascending: true });

        if (error) {
          body.innerHTML = '<p style="color:red;">Yüklenemedi.</p>';
          return;
        }

        if (!data || data.length === 0) {
          body.innerHTML =
            '<p style="color:var(--muted); padding:16px 0; font-size:0.88rem;">Bu kategoride henüz ürün yok. "+ Ürün Ekle" ile başlayın.</p>';
          return;
        }

        body.innerHTML = `
          <table class="item-table">
            <thead>
              <tr>
                <th></th>
                <th>Ürün Adı</th>
                <th>Fiyat</th>
                <th>Durum</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${data
                .map(
                  (item) => `
                <tr>
                  <td>
                    ${
                      item.image_url
                        ? `<img class="item-thumb" src="${escHtml(item.image_url)}" alt="" />`
                        : `<div class="item-thumb-placeholder">🍞</div>`
                    }
                  </td>
                  <td>
                    <strong>${escHtml(item.name)}</strong>
                    ${item.description ? `<br /><small style="color:var(--muted)">${escHtml(item.description)}</small>` : ""}
                  </td>
                  <td style="white-space:nowrap; font-weight:600;">${fmtPrice(item.price)}</td>
                  <td>
                    <span class="badge badge--${item.available ? "on" : "off"}">
                      ${item.available ? "Mevcut" : "Tükendi"}
                    </span>
                  </td>
                  <td>
                    <div class="actions">
                      <button class="btn btn--secondary btn--sm"
                              onclick="editItem(${JSON.stringify(JSON.stringify(item))})">Düzenle</button>
                      <button class="btn btn--danger btn--sm"
                              onclick="deleteItem('${item.id}')">Sil</button>
                    </div>
                  </td>
                </tr>
              `,
                )
                .join("")}
            </tbody>
          </table>`;
      }

      // Ürün CRUD
      document.getElementById("openItemModal").addEventListener("click", () => {
        document.getElementById("itemId").value = "";
        document.getElementById("itemName").value = "";
        document.getElementById("itemDesc").value = "";
        document.getElementById("itemPrice").value = "";
        document.getElementById("itemAvailable").value = "true";
        document.getElementById("itemModalTitle").textContent = "Ürün Ekle";
        document.getElementById("itemError").style.display = "none";
        resetImgPreview();
        uploadedImgUrl = null;
        openModal("itemModal");
      });

      function editItem(jsonStr) {
        const item = JSON.parse(jsonStr);
        document.getElementById("itemId").value = item.id;
        document.getElementById("itemName").value = item.name;
        document.getElementById("itemDesc").value = item.description || "";
        document.getElementById("itemPrice").value = item.price;
        document.getElementById("itemAvailable").value = String(item.available);
        document.getElementById("itemModalTitle").textContent = "Ürün Düzenle";
        document.getElementById("itemError").style.display = "none";
        uploadedImgUrl = item.image_url || null;

        const preview = document.getElementById("imgPreview");
        if (item.image_url) {
          preview.innerHTML = `<img src="${escHtml(item.image_url)}" alt="" />`;
        } else {
          resetImgPreview();
        }

        openModal("itemModal");
      }

      // Görsel yükleme
      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const preview = document.getElementById("imgPreview");
          const progress = document.getElementById("uploadProgress");
          const bar = document.getElementById("progressBar");
          const errEl = document.getElementById("itemError");

          if (file.size > 5 * 1024 * 1024) {
            errEl.textContent = "Görsel 5 MB'dan küçük olmalı.";
            errEl.style.display = "block";
            return;
          }

          // Önizleme
          const reader = new FileReader();
          reader.onload = (ev) => {
            preview.innerHTML = `<img src="${ev.target.result}" alt="" />`;
          };
          reader.readAsDataURL(file);

          // Supabase Storage'a yükle
          progress.style.display = "block";
          bar.style.width = "30%";

          const ext = file.name.split(".").pop();
          const fileName = `${Date.now()}.${ext}`;

          const { data, error } = await sb.storage
            .from("menu-images")
            .upload(fileName, file, { upsert: false });

          bar.style.width = "100%";
          setTimeout(() => {
            progress.style.display = "none";
            bar.style.width = "0%";
          }, 500);

          if (error) {
            errEl.textContent = "Görsel yüklenemedi: " + error.message;
            errEl.style.display = "block";
            return;
          }

          const {
            data: { publicUrl },
          } = sb.storage.from("menu-images").getPublicUrl(data.path);
          uploadedImgUrl = publicUrl;
        });

      document
        .getElementById("saveItemBtn")
        .addEventListener("click", async () => {
          const id = document.getElementById("itemId").value;
          const name = document.getElementById("itemName").value.trim();
          const desc = document.getElementById("itemDesc").value.trim();
          const priceRaw = document.getElementById("itemPrice").value;
          const available =
            document.getElementById("itemAvailable").value === "true";
          const errEl = document.getElementById("itemError");

          errEl.style.display = "none";

          if (!name) {
            errEl.textContent = "Ürün adı gerekli.";
            errEl.style.display = "block";
            return;
          }
          if (!priceRaw) {
            errEl.textContent = "Fiyat gerekli.";
            errEl.style.display = "block";
            return;
          }

          const price = parseFloat(priceRaw);
          if (isNaN(price) || price < 0) {
            errEl.textContent = "Geçerli bir fiyat girin.";
            errEl.style.display = "block";
            return;
          }

          const payload = {
            category_id: currentCatId,
            name,
            description: desc || null,
            price,
            available,
            image_url: uploadedImgUrl || null,
          };

          let error;
          if (id) {
            ({ error } = await sb
              .from("menu_items")
              .update(payload)
              .eq("id", id));
          } else {
            ({ error } = await sb.from("menu_items").insert(payload));
          }

          if (error) {
            errEl.textContent = error.message;
            errEl.style.display = "block";
            return;
          }

          closeModal("itemModal");
          toast("Ürün kaydedildi", "success");
          loadItems();
          loadCategories();
        });

      async function deleteItem(id) {
        if (!confirm("Bu ürün silinecek. Emin misiniz?")) return;
        const { error } = await sb.from("menu_items").delete().eq("id", id);
        if (error) {
          toast("Silinemedi: " + error.message, "error");
          return;
        }
        toast("Ürün silindi", "success");
        loadItems();
        loadCategories();
      }

      // ─── Yardımcılar ─────────────────────────────────
      function openModal(id) {
        document.getElementById(id).classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }

      document.querySelectorAll(".modal-backdrop").forEach((bd) => {
        bd.addEventListener("click", (e) => {
          if (e.target === bd) closeModal(bd.id);
        });
      });

      function resetImgPreview() {
        document.getElementById("imgPreview").innerHTML =
          '<div class="img-preview__label">Fotoğraf seç<br /><small>Tıkla veya sürükle</small></div>';
        document.getElementById("fileInput").value = "";
      }

      const fmtP = new Intl.NumberFormat("tr-TR", {
        style: "currency",
        currency: "TRY",
      });
      function fmtPrice(v) {
        return fmtP.format(v);
      }

      function escHtml(str) {
        return String(str ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escJs(str) {
        return String(str ?? "")
          .replace(/\\/g, "\\\\")
          .replace(/'/g, "\\'");
      }

      let toastTimer;
      function toast(msg, type = "") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "toast show" + (type ? " " + type : "");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          el.classList.remove("show");
        }, 3000);
      }
    </script>
  </body>
</html>
