<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menü — Emin Fırın</title>
    <meta
      name="description"
      content="Emin Fırın QR Menüsü — taze ekmek, poğaça, simit, tatlı ve içecekler."
    />
    <link rel="canonical" href="https://eminfirincafe.com/menu.html" />
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png" />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cream: #fff5d8;
        --cream2: #faecc0;
        --brown: #4a2300;
        --brown2: #7a4010;
        --muted: rgba(74, 35, 0, 0.48);
        --border: rgba(74, 35, 0, 0.14);
        --serif: Georgia, "Times New Roman", serif;
        --sans: "Helvetica Neue", Arial, sans-serif;
        --radius: 10px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--cream);
        color: var(--brown);
        font-family: var(--sans);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ---- Header ---- */
      .menu-header {
        background: var(--brown);
        padding: 28px 24px 24px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .menu-header__logo {
        display: inline-block;
        line-height: 0;
        margin-bottom: 10px;
      }

      .menu-header__logo img {
        height: 56px;
        width: auto;
      }

      .menu-header__title {
        font-family: var(--serif);
        font-size: 1.1rem;
        font-weight: 400;
        color: var(--cream);
        letter-spacing: 0.08em;
      }

      /* ---- Category tabs ---- */
      .cat-tabs {
        background: var(--cream2);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        gap: 4px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        position: sticky;
        top: 116px;
        z-index: 90;
      }

      .cat-tabs::-webkit-scrollbar {
        display: none;
      }

      .cat-tab {
        display: inline-block;
        white-space: nowrap;
        padding: 14px 16px;
        font-size: 0.74rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition:
          color 0.2s,
          border-color 0.2s;
        user-select: none;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        font-family: var(--sans);
      }

      .cat-tab.active {
        color: var(--brown);
        border-bottom-color: var(--brown);
      }

      /* ---- Main layout ---- */
      .menu-main {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 16px 80px;
      }

      /* ---- Category section ---- */
      .cat-section {
        margin-bottom: 56px;
      }

      .cat-section__title {
        font-family: var(--serif);
        font-size: 1.5rem;
        font-weight: 400;
        color: var(--brown);
        border-bottom: 1px solid var(--border);
        padding-bottom: 16px;
        margin-bottom: 24px;
        letter-spacing: 0.02em;
      }

      /* ---- Product grid ---- */
      .items-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      /* ---- Product card ---- */
      .item-card {
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          box-shadow 0.25s,
          transform 0.25s;
      }

      .item-card:hover {
        box-shadow: 0 6px 24px rgba(74, 35, 0, 0.12);
        transform: translateY(-2px);
      }

      .item-card__img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        background: var(--cream2);
        display: block;
      }

      .item-card__img-placeholder {
        width: 100%;
        height: 180px;
        background: var(--cream2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
      }

      .item-card__body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .item-card__name {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--brown);
        line-height: 1.3;
      }

      .item-card__desc {
        font-size: 0.82rem;
        line-height: 1.6;
        color: var(--muted);
        flex: 1;
      }

      .item-card__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }

      .item-card__price {
        font-family: var(--serif);
        font-size: 1.2rem;
        font-weight: 400;
        color: var(--brown);
      }

      .item-card__unavailable {
        font-size: 0.68rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        background: var(--cream2);
        padding: 3px 8px;
        border-radius: 4px;
      }

      /* ---- Loading / Empty states ---- */
      .state-loading,
      .state-empty,
      .state-error {
        text-align: center;
        padding: 80px 24px;
        color: var(--muted);
      }

      .state-loading__spinner {
        width: 36px;
        height: 36px;
        border: 2px solid var(--border);
        border-top-color: var(--brown);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .state-empty__icon {
        font-size: 2.4rem;
        margin-bottom: 12px;
      }

      /* ---- Footer ---- */
      .menu-footer {
        background: var(--brown);
        color: rgba(255, 245, 216, 0.55);
        text-align: center;
        padding: 24px 16px;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
      }

      .menu-footer a {
        color: var(--cream2);
        text-decoration: none;
      }

      /* ---- Responsive ---- */
      @media (max-width: 640px) {
        .items-grid {
          grid-template-columns: 1fr;
        }

        .menu-main {
          padding: 24px 12px 60px;
        }

        .cat-section__title {
          font-size: 1.2rem;
        }

        .cat-tab {
          padding: 12px 12px;
          font-size: 0.68rem;
          letter-spacing: 0.08em;
        }

        .item-card__img {
          height: 160px;
        }

        .item-card__name {
          font-size: 0.9rem;
        }

        .item-card__price {
          font-size: 1.05rem;
        }
      }

      @media (max-width: 400px) {
        .menu-header {
          padding: 14px 14px 10px;
        }

        .menu-header__logo img {
          height: 40px;
        }

        .menu-main {
          padding: 20px 10px 60px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="menu-header">
      <a href="index.html" class="menu-header__logo">
        <img src="assets/images/Logo.png" alt="Emin Fırın" />
      </a>
      <div class="menu-header__title">Güncel Menü</div>
    </header>

    <!-- Category tabs (JS ile doldurulur) -->
    <div class="cat-tabs" id="catTabs"></div>

    <!-- Main content -->
    <main class="menu-main" id="menuMain">
      <div class="state-loading">
        <div class="state-loading__spinner"></div>
        <p>Menü yükleniyor…</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="menu-footer">
      <p>
        © 2026 Emin Fırın &nbsp;·&nbsp;
        <a href="tel:+905493470747">+90 549 347 07 47</a>
      </p>
    </footer>

    <!-- Supabase JS v2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      // ─── Supabase bağlantısı ───────────────────────────
      const SUPABASE_URL = "https://psrkdpmnxdxsutpdyjtb.supabase.co"; // ← Supabase proje URL'ini buraya yapıştır
      const SUPABASE_ANON = "sb_publishable_IHApcPm72s-UIqW9oLfjyQ_jDNj5k49"; // ← anon public key

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      // ─── Fiyat formatlama ─────────────────────────────
      const fmt = new Intl.NumberFormat("tr-TR", {
        style: "currency",
        currency: "TRY",
        minimumFractionDigits: 2,
      });

      // ─── Menüyü çek ve oluştur ────────────────────────
      async function loadMenu() {
        const main = document.getElementById("menuMain");
        const tabsEl = document.getElementById("catTabs");

        try {
          // Kategorileri sıraya göre çek
          const { data: cats, error: catErr } = await sb
            .from("categories")
            .select("*")
            .order("sort_order", { ascending: true });

          if (catErr) throw catErr;

          if (!cats || cats.length === 0) {
            main.innerHTML = `<div class="state-empty">
              <div class="state-empty__icon">🍞</div>
              <p>Menü henüz hazırlanmadı.</p>
            </div>`;
            return;
          }

          // Tüm ürünleri tek sorguda çek
          const { data: items, error: itemErr } = await sb
            .from("menu_items")
            .select("*")
            .order("sort_order", { ascending: true });

          if (itemErr) throw itemErr;

          // Ürünleri kategori bazında grupla
          const byCategory = {};
          cats.forEach((c) => {
            byCategory[c.id] = [];
          });
          (items || []).forEach((item) => {
            if (byCategory[item.category_id]) {
              byCategory[item.category_id].push(item);
            }
          });

          // Boş kategorileri filtrele
          const activeCats = cats.filter((c) => byCategory[c.id].length > 0);

          if (activeCats.length === 0) {
            main.innerHTML = `<div class="state-empty">
              <div class="state-empty__icon">🍞</div>
              <p>Menü henüz hazırlanmadı.</p>
            </div>`;
            return;
          }

          // Tab'ları oluştur
          tabsEl.innerHTML = activeCats
            .map(
              (c, i) => `
            <button class="cat-tab ${i === 0 ? "active" : ""}"
                    data-slug="${c.slug}"
                    onclick="scrollToSection('${c.slug}')">
              ${c.name}
            </button>
          `,
            )
            .join("");

          // Kategorileri ve ürünleri oluştur
          main.innerHTML = activeCats
            .map(
              (cat) => `
            <section class="cat-section" id="cat-${cat.slug}">
              <h2 class="cat-section__title">${cat.name}</h2>
              <div class="items-grid">
                ${byCategory[cat.id].map((item) => buildCard(item)).join("")}
              </div>
            </section>
          `,
            )
            .join("");

          // Scroll spy için IntersectionObserver
          setupScrollSpy();
        } catch (err) {
          console.error(err);
          main.innerHTML = `<div class="state-error">
            <p>Menü yüklenemedi. Lütfen sayfayı yenileyin.</p>
          </div>`;
        }
      }

      function buildCard(item) {
        const imgHtml = item.image_url
          ? `<img class="item-card__img" src="${escHtml(item.image_url)}" alt="${escHtml(item.name)}" loading="lazy" />`
          : `<div class="item-card__img-placeholder">🍞</div>`;

        const statusHtml = !item.available
          ? `<span class="item-card__unavailable">Tükendi</span>`
          : "";

        const descHtml = item.description
          ? `<p class="item-card__desc">${escHtml(item.description)}</p>`
          : "";

        return `
          <div class="item-card ${!item.available ? "item-card--sold-out" : ""}">
            ${imgHtml}
            <div class="item-card__body">
              <div class="item-card__name">${escHtml(item.name)}</div>
              ${descHtml}
              <div class="item-card__footer">
                <span class="item-card__price">${fmt.format(item.price)}</span>
                ${statusHtml}
              </div>
            </div>
          </div>`;
      }

      function escHtml(str) {
        return String(str ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function scrollToSection(slug) {
        const el = document.getElementById("cat-" + slug);
        if (!el) return;
        const headerH =
          document.querySelector(".menu-header")?.offsetHeight || 0;
        const tabsH = document.getElementById("catTabs")?.offsetHeight || 0;
        const top =
          el.getBoundingClientRect().top + window.scrollY - headerH - tabsH - 8;
        window.scrollTo({ top, behavior: "smooth" });
      }

      // Sticky tabs: header yüksekliğine göre top dinamik ayarlanır
      function updateTabsTop() {
        const h = document.querySelector(".menu-header");
        const t = document.getElementById("catTabs");
        if (h && t) t.style.top = h.offsetHeight + "px";
      }
      window.addEventListener("resize", updateTabsTop);
      updateTabsTop();

      function setupScrollSpy() {
        const sections = document.querySelectorAll(".cat-section");
        const tabs = document.querySelectorAll(".cat-tab");
        const obs = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const slug = entry.target.id.replace("cat-", "");
                tabs.forEach((t) =>
                  t.classList.toggle("active", t.dataset.slug === slug),
                );
              }
            });
          },
          { rootMargin: "-30% 0px -60% 0px" },
        );
        sections.forEach((s) => obs.observe(s));
      }

      loadMenu().then(updateTabsTop);
    </script>
  </body>
</html>
