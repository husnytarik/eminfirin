<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menü — Emin Fırın</title>
    <meta name="description" content="Emin Fırın QR Menüsü — taze ekmek, poğaça, simit, tatlı ve içecekler." />
    <link rel="canonical" href="https://eminfirincafe.com/menu.html" />
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.png" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:     #F5F0E8;
        --white:  #FFFFFF;
        --brown:  #3D2010;
        --brown2: #6B3A1F;
        --amber:  #C49A3C;
        --muted:  rgba(30,16,9,0.42);
        --border: rgba(61,32,16,0.08);
        --sans:   -apple-system, "Helvetica Neue", Arial, sans-serif;
        --serif:  Georgia, "Times New Roman", serif;
      }

      html { scroll-behavior: smooth; }

      body {
        background: var(--bg);
        color: var(--brown);
        font-family: var(--sans);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* ── Header ── */
      .m-header {
        background: var(--brown);
        height: 60px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 12px;
      }

      .m-header__logo {
        height: 36px;
        width: 36px;
        border-radius: 9px;
        overflow: hidden;
        flex-shrink: 0;
        background: rgba(255,255,255,0.1);
      }

      .m-header__logo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .m-header__info { flex: 1; }

      .m-header__name {
        font-size: 0.88rem;
        font-weight: 600;
        color: #fff;
        line-height: 1.2;
      }

      .m-header__sub {
        font-size: 0.65rem;
        color: rgba(255,255,255,0.50);
        letter-spacing: 0.06em;
      }

      /* ── Category tabs (pill style) ── */
      .cat-tabs {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 10px 12px;
        display: flex;
        gap: 8px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        position: sticky;
        z-index: 90;
      }

      .cat-tabs::-webkit-scrollbar { display: none; }

      .cat-tab {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        padding: 7px 14px;
        font-size: 0.75rem;
        font-weight: 500;
        font-family: var(--sans);
        color: var(--muted);
        background: transparent;
        border: 1.5px solid transparent;
        border-radius: 100px;
        cursor: pointer;
        transition: background 0.18s, color 0.18s, border-color 0.18s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .cat-tab.active {
        background: var(--brown);
        color: #fff;
        border-color: var(--brown);
      }

      .cat-tab:not(.active):hover {
        background: rgba(61,32,16,0.06);
        border-color: rgba(61,32,16,0.14);
        color: var(--brown);
      }

      /* ── Main ── */
      .m-main {
        max-width: 680px;
        margin: 0 auto;
        padding: 0 0 80px;
      }

      /* ── Category section ── */
      .cat-section { margin-top: 20px; }

      .cat-section__label {
        font-size: 0.62rem;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 16px 8px;
      }

      .cat-section__list {
        background: var(--white);
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }

      /* ── Product row ── */
      .item-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }

      .item-row:last-child { border-bottom: none; }

      .item-row--sold-out { opacity: 0.5; }

      .item-row__body { flex: 1; min-width: 0; }

      .item-row__name {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--brown);
        line-height: 1.3;
        margin-bottom: 3px;
      }

      .item-row__desc {
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 6px;
      }

      .item-row__price {
        font-family: var(--serif);
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--brown);
      }

      .item-row__badge {
        font-size: 0.60rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        background: rgba(61,32,16,0.07);
        padding: 2px 7px;
        border-radius: 4px;
        margin-left: 6px;
        vertical-align: middle;
      }

      .item-row__img {
        width: 76px;
        height: 76px;
        border-radius: 10px;
        object-fit: cover;
        flex-shrink: 0;
        display: block;
        background: rgba(61,32,16,0.06);
      }

      .item-row__placeholder {
        width: 76px;
        height: 76px;
        border-radius: 10px;
        flex-shrink: 0;
        background: rgba(61,32,16,0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
      }

      /* ── States ── */
      .state-loading,
      .state-empty,
      .state-error {
        text-align: center;
        padding: 80px 24px;
        color: var(--muted);
      }

      .state-loading__spinner {
        width: 28px;
        height: 28px;
        border: 2px solid rgba(61,32,16,0.12);
        border-top-color: var(--brown);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Footer ── */
      .m-footer {
        background: var(--brown);
        color: rgba(255,255,255,0.40);
        text-align: center;
        padding: 20px 16px;
        font-size: 0.70rem;
        letter-spacing: 0.08em;
      }

      .m-footer a {
        color: rgba(255,255,255,0.60);
        text-decoration: none;
      }
    </style>
  </head>
  <body>

    <header class="m-header">
      <div class="m-header__logo">
        <img src="assets/images/Logo.png" alt="Emin Fırın" />
      </div>
      <div class="m-header__info">
        <div class="m-header__name">Emin Fırın</div>
        <div class="m-header__sub">Güncel Menü</div>
      </div>
    </header>

    <div class="cat-tabs" id="catTabs"></div>

    <main class="m-main" id="menuMain">
      <div class="state-loading">
        <div class="state-loading__spinner"></div>
        <p>Yükleniyor…</p>
      </div>
    </main>

    <footer class="m-footer">
      <p>© 2026 Emin Fırın &nbsp;·&nbsp; <a href="tel:+905493470747">+90 549 347 07 47</a></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
      const SUPABASE_URL  = "https://psrkdpmnxdxsutpdyjtb.supabase.co";
      const SUPABASE_ANON = "sb_publishable_IHApcPm72s-UIqW9oLfjyQ_jDNj5k49";
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

      const fmt = new Intl.NumberFormat("tr-TR", {
        style: "currency", currency: "TRY", minimumFractionDigits: 2,
      });

      async function loadMenu() {
        const main   = document.getElementById("menuMain");
        const tabsEl = document.getElementById("catTabs");

        try {
          const { data: cats, error: catErr } = await sb
            .from("categories").select("*").order("sort_order", { ascending: true });
          if (catErr) throw catErr;

          if (!cats || cats.length === 0) {
            main.innerHTML = `<div class="state-empty"><p>Menü henüz hazırlanmadı.</p></div>`;
            return;
          }

          const { data: items, error: itemErr } = await sb
            .from("menu_items").select("*").order("sort_order", { ascending: true });
          if (itemErr) throw itemErr;

          const byCategory = {};
          cats.forEach(c => { byCategory[c.id] = []; });
          (items || []).forEach(item => {
            if (byCategory[item.category_id]) byCategory[item.category_id].push(item);
          });

          const activeCats = cats.filter(c => byCategory[c.id].length > 0);

          if (activeCats.length === 0) {
            main.innerHTML = `<div class="state-empty"><p>Menü henüz hazırlanmadı.</p></div>`;
            return;
          }

          tabsEl.innerHTML = activeCats.map((c, i) => `
            <button class="cat-tab ${i === 0 ? "active" : ""}"
                    data-slug="${c.slug}"
                    onclick="scrollToSection('${c.slug}')">
              ${c.name}
            </button>`).join("");

          main.innerHTML = activeCats.map(cat => `
            <section class="cat-section" id="cat-${cat.slug}">
              <div class="cat-section__label">${cat.name}</div>
              <div class="cat-section__list">
                ${byCategory[cat.id].map(item => buildRow(item)).join("")}
              </div>
            </section>`).join("");

          setupScrollSpy();
        } catch (err) {
          console.error(err);
          main.innerHTML = `<div class="state-error"><p>Menü yüklenemedi. Sayfayı yenileyin.</p></div>`;
        }
      }

      function buildRow(item) {
        const imgHtml = item.image_url
          ? `<img class="item-row__img" src="${esc(item.image_url)}" alt="${esc(item.name)}" loading="lazy" />`
          : `<div class="item-row__placeholder">🍞</div>`;

        const badge = !item.available
          ? `<span class="item-row__badge">Tükendi</span>` : "";

        const desc = item.description
          ? `<div class="item-row__desc">${esc(item.description)}</div>` : "";

        return `
          <div class="item-row ${!item.available ? "item-row--sold-out" : ""}">
            <div class="item-row__body">
              <div class="item-row__name">${esc(item.name)}${badge}</div>
              ${desc}
              <div class="item-row__price">${fmt.format(item.price)}</div>
            </div>
            ${imgHtml}
          </div>`;
      }

      function esc(str) {
        return String(str ?? "")
          .replace(/&/g,"&amp;").replace(/</g,"&lt;")
          .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      function scrollToSection(slug) {
        const el = document.getElementById("cat-" + slug);
        if (!el) return;
        const hH = document.querySelector(".m-header")?.offsetHeight || 0;
        const tH = document.getElementById("catTabs")?.offsetHeight || 0;
        const top = el.getBoundingClientRect().top + window.scrollY - hH - tH - 8;
        window.scrollTo({ top, behavior: "smooth" });
      }

      function updateTabsTop() {
        const h = document.querySelector(".m-header");
        const t = document.getElementById("catTabs");
        if (h && t) t.style.top = h.offsetHeight + "px";
      }
      window.addEventListener("resize", updateTabsTop);
      updateTabsTop();

      function setupScrollSpy() {
        const sections = document.querySelectorAll(".cat-section");
        const tabs     = document.querySelectorAll(".cat-tab");
        const obs = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const slug = entry.target.id.replace("cat-", "");
              tabs.forEach(t => t.classList.toggle("active", t.dataset.slug === slug));
            }
          });
        }, { rootMargin: "-30% 0px -60% 0px" });
        sections.forEach(s => obs.observe(s));
      }

      loadMenu().then(updateTabsTop);
    </script>
  </body>
</html>
